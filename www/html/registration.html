    <meta charset="utf-8">

<body>

    <section class="vh-100 gradient-custom">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                    <div class="card bg-dark text-white" style="border-radius: 1rem;">
                        <div class="card-body p-5 text-center">
                            <div class="mb-md-5 mt-md-4 pb-5">
                                <img src="./img/pizza.svg" alt="logo" width="100" class="mb-4">
                                <h2 class="fw-bold mb-2 text-uppercase">Register</h2>
                                <p class="text-white-50 mb-5">Please Insert all the needed informations</p>
                                <form action="registration.php" method="post">
                                    <div class="form-outline form-white mb-4">
                                        <input type="text" name="firstname" id="typeFirstNameX"
                                            class="form-control form-control-lg" required placeholder="First Name" />
                                    </div>

                                    <div class="form-outline form-white mb-4">
                                        <input type="text" name="lastname" id="typeLastNameX"
                                            class="form-control form-control-lg" required placeholder="Last Name" />
                                    </div>

                                    <div class="form-outline form-white mb-4">
                                        <input type="email" name="email" id="typeEmailX"
                                            class="form-control form-control-lg" required placeholder="Email" />
                                    </div>

                                    <div class="form-outline form-white mb-4">
                                        <input type="password" name="pass" id="typePasswordX"
                                            class="form-control form-control-lg" required placeholder="Password"/>
                                    </div>

                                    <div class="form-outline form-white mb-4">
                                        <input type="password" name="pass" id="typePasswordX"
                                            class="form-control form-control-lg" required placeholder="Confirm Password"/>
                                    </div>

                                    <button class="btn btn-outline-light btn-lg px-5" type="submit" name="submit"
                                        value="submit">Register</button>
                                </form>
                            </div>
                            <div>
                                <p class="mb-0">Already Have an Account? <a href="login.html"
                                        class="text-white-50 fw-bold">Login</a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
